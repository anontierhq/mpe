[package]
name = "mpe"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.99"
cfg-if = "1.0.3"
clap = { version = "4.5", features = ["derive", "env"] }
futures = "0.3.31"
futures-lite = "2.6.1"
indoc = "2.0.6"
lapin = "3.4.0"
log = "0.4.28"
rand = "0.9.2"
serde = { version = "1.0.223", features = ["derive"] }
serde_json = "1.0.145"
threadpool = "1.8.1"

[dependencies.simple_logger]
version = "5.0.0"
features = ["colors", "threads", "timestamps", "stderr"]

[dependencies.tokio]
version = "1.47.1"
features = ["rt-multi-thread", "macros"]

[profile.release]
opt-level = "s"
lto = "fat"
